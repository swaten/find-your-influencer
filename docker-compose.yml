services:
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: fyi_queue
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - .:/var/www/html
    environment:
      # overrides the host-oriented values in .env - this container talks to
      # postgres/redis over the internal docker network, not via host ports
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - fyi_net

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: fyi_scheduler
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - fyi_net

  postgres:
    image: postgres:16-alpine
    container_name: fyi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-findyourinfluencer}
      POSTGRES_USER: ${DB_USERNAME:-fyi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - fyi_pgdata:/var/lib/postgresql/data
    networks:
      - fyi_net

  redis:
    image: redis:7-alpine
    container_name: fyi_redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    volumes:
      - fyi_redisdata:/data
    networks:
      - fyi_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fyi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@findyourinfluencer.com
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - fyi_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - fyi_net

volumes:
  fyi_pgdata:
  fyi_redisdata:
  fyi_pgadmin_data:

networks:
  fyi_net:
    driver: bridge
